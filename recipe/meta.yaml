{% set name = "qt-material" %}
{% set version = "2.17" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: b500a0c1f5ef8f46a8cf037d1aa5bdf9ea4eb618180b6332539dfbdd0647ad0d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.7
  run:
    - jinja2
    - python >=3.7

test:
  imports:
    - qt_material
  commands:
    - pip list
    - pip check
  requires:
    - pip

about:
  home: https://github.com/UN-GCPDS/qt-material
  summary: Material inspired stylesheet for PySide2, PySide6, PyQt5 and PyQt6.
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - goanpeca
